<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>המזווה שלי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Frank+Ruhl+Libre:wght@500;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  :root {
    --bg: #f5f1e8;
    --bg-dark: #ebe4d1;
    --ink: #1a1612;
    --accent: #c8553d;
    --accent-soft: #e8a598;
    --olive: #6b7a3a;
    --mustard: #d4a017;
    --card: #fffdf7;
    --shadow: rgba(26, 22, 18, 0.08);
    --shadow-strong: rgba(26, 22, 18, 0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(200, 85, 61, 0.06) 0%, transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(107, 122, 58, 0.06) 0%, transparent 40%);
    padding-bottom: 100px;
  }

  header {
    padding: 24px 20px 16px;
    position: sticky;
    top: 0;
    background: linear-gradient(180deg, var(--bg) 0%, var(--bg) 80%, transparent 100%);
    z-index: 100;
    backdrop-filter: blur(8px);
  }

  h1 {
    font-family: 'Frank Ruhl Libre', serif;
    font-weight: 900;
    font-size: 34px;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  h1 .dot { color: var(--accent); }

  .subtitle {
    font-size: 13px;
    color: rgba(26, 22, 18, 0.5);
    margin-top: 4px;
    font-weight: 400;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 0 20px;
    margin-bottom: 16px;
  }

  .stat {
    background: var(--card);
    border-radius: 14px;
    padding: 12px 10px;
    text-align: center;
    box-shadow: 0 2px 8px var(--shadow);
    border: 1px solid rgba(0,0,0,0.03);
  }
  .stat .num {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 24px;
    font-weight: 900;
    line-height: 1;
  }
  .stat .label {
    font-size: 11px;
    color: rgba(26, 22, 18, 0.55);
    margin-top: 4px;
    font-weight: 500;
  }
  .stat.alert .num { color: var(--accent); }
  .stat.warn .num { color: var(--mustard); }

  .search-row {
    padding: 0 20px;
    margin-bottom: 12px;
    display: flex;
    gap: 8px;
  }

  .search-input {
    flex: 1;
    background: var(--card);
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 12px;
    padding: 12px 16px;
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    transition: all 0.2s;
  }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200, 85, 61, 0.1);
  }
  .search-input::placeholder { color: rgba(26, 22, 18, 0.35); }

  .filter-chips {
    display: flex;
    gap: 6px;
    padding: 0 20px 12px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filter-chips::-webkit-scrollbar { display: none; }

  .chip {
    padding: 6px 14px;
    background: var(--card);
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    border: 1px solid rgba(0,0,0,0.06);
    cursor: pointer;
    transition: all 0.2s;
    color: rgba(26, 22, 18, 0.7);
  }
  .chip.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  .items {
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .item {
    background: var(--card);
    border-radius: 16px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 10px var(--shadow);
    border: 1px solid rgba(0,0,0,0.03);
    position: relative;
    overflow: hidden;
  }
  .item.low::before {
    content: '';
    position: absolute;
    inset-inline-start: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: var(--accent);
  }
  .item.expiring::before {
    content: '';
    position: absolute;
    inset-inline-start: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: var(--mustard);
  }

  .item-thumb {
    width: 52px;
    height: 52px;
    border-radius: 10px;
    background: var(--bg-dark);
    flex-shrink: 0;
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  .item-main { flex: 1; min-width: 0; }
  .item-name {
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .item-meta {
    font-size: 11px;
    color: rgba(26, 22, 18, 0.55);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .item-meta span {
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  .meta-warn { color: var(--accent) !important; font-weight: 600; }
  .meta-soon { color: var(--mustard) !important; font-weight: 600; }

  .qty-control {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--bg-dark);
    border-radius: 20px;
    padding: 4px;
    flex-shrink: 0;
  }
  .qty-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: var(--card);
    color: var(--ink);
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .qty-btn:active { transform: scale(0.9); }
  .qty-num {
    font-weight: 700;
    font-size: 15px;
    min-width: 20px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: rgba(26, 22, 18, 0.4);
  }
  .empty-emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; }

  .fab-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 50;
  }

  .fab {
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: 28px;
    padding: 14px 22px;
    font-family: inherit;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    box-shadow: 0 8px 24px var(--shadow-strong);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .fab.primary {
    background: var(--accent);
    padding: 16px 28px;
    font-size: 16px;
  }
  .fab:active { transform: scale(0.96); }
  .fab-icon { font-size: 20px; line-height: 1; }

  /* Modals */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(26, 22, 18, 0.5);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-backdrop.active { display: flex; }

  .modal {
    background: var(--bg);
    width: 100%;
    max-width: 500px;
    border-radius: 24px 24px 0 0;
    padding: 20px 20px 30px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease-out;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: rgba(0,0,0,0.15);
    border-radius: 2px;
    margin: 0 auto 16px;
  }

  .modal-title {
    font-family: 'Frank Ruhl Libre', serif;
    font-weight: 900;
    font-size: 24px;
    margin-bottom: 16px;
  }

  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: rgba(26, 22, 18, 0.7);
  }
  .form-input, .form-select {
    width: 100%;
    background: var(--card);
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 10px;
    padding: 11px 14px;
    font-family: inherit;
    font-size: 15px;
    outline: none;
  }
  .form-input:focus, .form-select:focus {
    border-color: var(--accent);
  }
  textarea.form-input {
    resize: vertical;
    min-height: 60px;
    font-family: inherit;
  }
  .expiry-hint {
    font-size: 11px;
    color: var(--olive);
    margin-top: 4px;
    font-weight: 500;
    min-height: 14px;
  }
  .expiry-hint.auto {
    color: var(--accent);
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  /* Image preview in form */
  .image-field {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 14px;
  }
  .image-preview {
    width: 80px;
    height: 80px;
    border-radius: 12px;
    background: var(--card);
    border: 2px dashed rgba(0,0,0,0.15);
    background-size: cover;
    background-position: center;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: rgba(0,0,0,0.25);
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .image-preview.has-image {
    border-style: solid;
    border-color: var(--olive);
  }
  .image-actions {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .img-btn {
    background: var(--card);
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
  }
  .img-btn:active { transform: scale(0.97); }
  .img-btn.danger { color: var(--accent); border-color: var(--accent-soft); }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }
  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    font-family: inherit;
    font-weight: 700;
    font-size: 15px;
    border: none;
    cursor: pointer;
  }
  .btn-primary { background: var(--ink); color: var(--bg); }
  .btn-secondary { background: var(--bg-dark); color: var(--ink); }
  .btn-danger { background: var(--accent); color: white; }
  .btn:active { transform: scale(0.97); }

  /* Scanner */
  #scanner-video, #ocr-video {
    width: 100%;
    border-radius: 12px;
    background: #000;
    aspect-ratio: 4/3;
    object-fit: cover;
  }
  .scan-box {
    position: relative;
    margin-bottom: 14px;
  }
  .scan-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .scan-frame {
    width: 75%;
    height: 40%;
    border: 2px solid var(--accent);
    border-radius: 8px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.3);
  }
  .scan-hint {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    white-space: nowrap;
  }

  /* Toast */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-120%);
    background: var(--ink);
    color: var(--bg);
    padding: 12px 20px;
    border-radius: 12px;
    font-weight: 500;
    font-size: 14px;
    z-index: 300;
    transition: transform 0.3s ease-out;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    max-width: 90%;
    text-align: center;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--olive); }
  .toast.error { background: var(--accent); }

  /* Loading overlay */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26, 22, 18, 0.7);
    backdrop-filter: blur(4px);
    z-index: 400;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    color: white;
  }
  .loading-overlay.active { display: flex; }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 15px; font-weight: 500; }
  .loading-progress { font-size: 12px; opacity: 0.7; }

  /* Menu */
  .menu-sheet {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .menu-item {
    padding: 14px 16px;
    border-radius: 12px;
    background: var(--card);
    border: none;
    text-align: right;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    color: var(--ink);
  }
  .menu-item:active { background: var(--bg-dark); }
  .menu-icon { font-size: 20px; }

  .alert-banner {
    background: var(--accent-soft);
    border-radius: 12px;
    padding: 10px 14px;
    margin: 0 20px 12px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .alert-banner.hidden { display: none; }

  .delete-link {
    font-size: 13px;
    color: var(--accent);
    background: none;
    border: none;
    padding: 8px 0;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
  }

  /* OCR result picker */
  .ocr-results {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 10px;
  }
  .ocr-result {
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
  }
  .ocr-result:active { background: var(--bg-dark); }
</style>
</head>
<body>

<header>
  <h1>המזווה<span class="dot">.</span></h1>
  <div class="subtitle" id="subtitle">טוען...</div>
</header>

<div class="stats">
  <div class="stat">
    <div class="num" id="stat-total">0</div>
    <div class="label">מוצרים</div>
  </div>
  <div class="stat alert">
    <div class="num" id="stat-low">0</div>
    <div class="label">נגמרים</div>
  </div>
  <div class="stat warn">
    <div class="num" id="stat-expiring">0</div>
    <div class="label">פגי־תוקף</div>
  </div>
</div>

<div class="alert-banner hidden" id="alert-banner"></div>

<div class="search-row">
  <input type="text" class="search-input" id="search" placeholder="חיפוש מוצר...">
</div>

<div class="filter-chips" id="filter-chips">
  <div class="chip active" data-filter="all">הכל</div>
  <div class="chip" data-filter="low">נגמרים</div>
  <div class="chip" data-filter="expiring">פגי־תוקף</div>
  <div class="chip" data-filter="has-notes">עם הערות</div>
</div>

<div class="items" id="items-list"></div>

<div class="fab-bar">
  <button class="fab" onclick="openMenu()">
    <span class="fab-icon">☰</span>
  </button>
  <button class="fab primary" onclick="startScan()">
    <span class="fab-icon">📷</span>
    סרוק ברקוד
  </button>
  <button class="fab" onclick="openAddModal()">
    <span class="fab-icon">+</span>
  </button>
</div>

<!-- Scanner Modal -->
<div class="modal-backdrop" id="scanner-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">סריקת ברקוד</div>
    <div class="scan-box">
      <video id="scanner-video" playsinline></video>
      <div class="scan-overlay"><div class="scan-frame"></div></div>
      <div class="scan-hint">כוון את המצלמה לברקוד</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="stopScan()">ביטול</button>
      <button class="btn btn-primary" onclick="manualBarcode()">הזנה ידנית</button>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-backdrop" id="add-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="add-title">הוספת מוצר</div>
    <form id="add-form" onsubmit="saveItem(event)">
      <input type="hidden" id="item-id">
      <input type="hidden" id="item-barcode">
      <input type="hidden" id="item-image">

      <!-- Image field -->
      <div class="image-field">
        <div class="image-preview" id="image-preview" onclick="captureProductImage()">
          <span id="image-preview-placeholder">📷</span>
        </div>
        <div class="image-actions">
          <button type="button" class="img-btn" onclick="captureProductImage()">
            📸 צלם תמונה
          </button>
          <button type="button" class="img-btn" onclick="chooseImage()">
            🖼️ בחר מגלריה
          </button>
          <button type="button" class="img-btn danger" id="remove-image-btn" onclick="removeImage()" style="display:none">
            🗑️ הסר תמונה
          </button>
        </div>
      </div>
      <input type="file" id="image-input" accept="image/*" style="display:none" onchange="handleImageFile(event)">
      <input type="file" id="image-camera-input" accept="image/*" capture="environment" style="display:none" onchange="handleImageFile(event)">

      <div class="form-group">
        <label class="form-label">שם המוצר</label>
        <input type="text" class="form-input" id="item-name" required>
        <button type="button" class="img-btn" onclick="ocrFromImage()" style="margin-top:6px; width:100%;" id="ocr-btn">
          🔍 זהה שם מהתמונה (OCR)
        </button>
      </div>

      <div class="form-group">
        <label class="form-label">חברה / מותג</label>
        <input type="text" class="form-input" id="item-company" placeholder="למשל: תנובה, אסם, שטראוס...">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">כמות</label>
          <input type="number" inputmode="numeric" pattern="[0-9]*" class="form-input" id="item-qty" min="0" value="1" required>
        </div>
        <div class="form-group">
          <label class="form-label">קטגוריה</label>
          <select class="form-select" id="item-category" onchange="suggestExpiry()">
            <option>מזון יבש</option>
            <option>שימורים</option>
            <option>חטיפים</option>
            <option>משקאות</option>
            <option>תבלינים</option>
            <option>ניקיון</option>
            <option>טואלטיקה</option>
            <option>אחר</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">תפוגה</label>
          <input type="date" class="form-input" id="item-expiry">
          <div class="expiry-hint" id="expiry-hint"></div>
        </div>
        <div class="form-group">
          <label class="form-label">מיקום במזווה</label>
          <input type="text" class="form-input" id="item-location" placeholder="מדף עליון...">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">סף התראה (כשיורד מתחת)</label>
        <input type="number" inputmode="numeric" pattern="[0-9]*" class="form-input" id="item-threshold" min="0" value="1">
      </div>

      <div class="form-group">
        <label class="form-label">הערות</label>
        <textarea class="form-input" id="item-notes" rows="3" placeholder="למשל: טבעוני, לאפייה, מתנה מסבתא..."></textarea>
      </div>

      <div class="btn-row">
        <button type="button" class="btn btn-secondary" onclick="closeAddModal()">ביטול</button>
        <button type="submit" class="btn btn-primary">שמור</button>
      </div>
      <div style="text-align: center; margin-top: 8px;">
        <button type="button" class="delete-link" id="delete-btn" onclick="deleteItem()" style="display:none">מחק מוצר</button>
      </div>
    </form>
  </div>
</div>

<!-- OCR Results Modal -->
<div class="modal-backdrop" id="ocr-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">בחר שם מהתוצאות</div>

<script>
  // ==================== STATE ====================
  let items = JSON.parse(localStorage.getItem('pantry-items') || '[]');
  let currentFilter = 'all';
  let searchTerm = '';
  let codeReader = null;

  // ==================== STORAGE ====================
  function save() {
    try {
      localStorage.setItem('pantry-items', JSON.stringify(items));
      render();
    } catch (e) {
      showToast('אין מקום לשמור - נסי למחוק תמונות', 'error');
    }
  }

  // ==================== IMAGE COMPRESSION ====================
  function compressImage(file, maxSize = 400, quality = 0.7) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let { width, height } = img;
          if (width > height) {
            if (width > maxSize) { height *= maxSize / width; width = maxSize; }
          } else {
            if (height > maxSize) { width *= maxSize / height; height = maxSize; }
          }
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // ==================== RENDER ====================
  function render() {
    const list = document.getElementById('items-list');
    const now = new Date();
    const in7days = new Date(now.getTime() + 7 * 86400000);

    const enriched = items.map(it => {
      const isLow = it.quantity <= (it.threshold || 1);
      const expDate = it.expiry ? new Date(it.expiry) : null;
      const isExpiring = expDate && expDate <= in7days;
      const isExpired = expDate && expDate < now;
      return { ...it, isLow, isExpiring, isExpired, expDate };
    });

    document.getElementById('stat-total').textContent = items.length;
    document.getElementById('stat-low').textContent = enriched.filter(i => i.isLow).length;
    document.getElementById('stat-expiring').textContent = enriched.filter(i => i.isExpiring).length;

    const subtitle = document.getElementById('subtitle');
    if (items.length === 0) {
      subtitle.textContent = 'התחילי בסריקת מוצר ראשון';
    } else {
      subtitle.textContent = `${items.length} פריטים רשומים`;
    }

    const alerts = enriched.filter(i => i.isExpired);
    const banner = document.getElementById('alert-banner');
    if (alerts.length > 0) {
      banner.classList.remove('hidden');
      banner.innerHTML = `⚠️ ${alerts.length} מוצרים עברו את התאריך`;
    } else {
      banner.classList.add('hidden');
    }

    let filtered = enriched;
    if (currentFilter === 'low') filtered = filtered.filter(i => i.isLow);
    if (currentFilter === 'expiring') filtered = filtered.filter(i => i.isExpiring);
    if (currentFilter === 'has-notes') filtered = filtered.filter(i => i.notes && i.notes.trim());
    if (searchTerm) {
      const t = searchTerm.toLowerCase();
      filtered = filtered.filter(i =>
        i.name.toLowerCase().includes(t) ||
        (i.company || '').toLowerCase().includes(t) ||
        (i.category || '').toLowerCase().includes(t) ||
        (i.location || '').toLowerCase().includes(t)
      );
    }

    filtered.sort((a, b) => {
      const pri = i => i.isExpired ? 0 : i.isLow ? 1 : i.isExpiring ? 2 : 3;
      if (pri(a) !== pri(b)) return pri(a) - pri(b);
      return a.name.localeCompare(b.name, 'he');
    });

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty">
          <div class="empty-emoji">${items.length === 0 ? '🥫' : '🔍'}</div>
          <div class="empty-text">${items.length === 0 ? 'המזווה ריק. סרקי מוצר להתחיל' : 'לא נמצאו תוצאות'}</div>
        </div>`;
      return;
    }

    list.innerHTML = filtered.map(it => {
      const cls = it.isLow ? 'low' : it.isExpiring ? 'expiring' : '';
      const daysLeft = it.expDate ? Math.ceil((it.expDate - now) / 86400000) : null;
      let expText = '';
      if (daysLeft !== null) {
        if (daysLeft < 0) expText = `<span class="meta-warn">פג לפני ${Math.abs(daysLeft)} ימים</span>`;
        else if (daysLeft === 0) expText = `<span class="meta-warn">פג היום</span>`;
        else if (daysLeft <= 7) expText = `<span class="meta-soon">עוד ${daysLeft} ימים</span>`;
        else expText = `<span>⏳ ${it.expDate.toLocaleDateString('he-IL')}</span>`;
      }
      const qtyText = it.isLow ? `<span class="meta-warn">⚠ נגמר</span>` : '';

      const thumbStyle = it.image
        ? `style="background-image: url('${it.image}')"`
        : '';
      const thumbContent = it.image ? '' : getCategoryEmoji(it.category);

      return `
        <div class="item ${cls}" onclick="editItem('${it.id}')">
          <div class="item-thumb" ${thumbStyle}>${thumbContent}</div>
          <div class="item-main">
            <div class="item-name">${escapeHtml(it.name)}${it.notes ? ' <span style="color: var(--mustard); font-size: 11px;">📝</span>' : ''}</div>
            <div class="item-meta">
              ${it.company ? `<span style="font-weight:600;">${escapeHtml(it.company)}</span>` : ''}
              ${it.category ? `<span>${escapeHtml(it.category)}</span>` : ''}
              ${it.location ? `<span>📍 ${escapeHtml(it.location)}</span>` : ''}
              ${expText}
              ${qtyText}
            </div>
          </div>
          <div class="qty-control" onclick="event.stopPropagation()">
            <button class="qty-btn" onclick="changeQty('${it.id}', -1)">−</button>
            <div class="qty-num">${it.quantity}</div>
            <button class="qty-btn" onclick="changeQty('${it.id}', 1)">+</button>
          </div>
        </div>`;
    }).join('');
  }

  function getCategoryEmoji(cat) {
    const map = {
      'מזון יבש': '🌾', 'שימורים': '🥫', 'חטיפים': '🍪',
      'משקאות': '🥤', 'תבלינים': '🧂', 'ניקיון': '🧽', 'טואלטיקה': '🧴'
    };
    return map[cat] || '📦';
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  // ==================== ITEM ACTIONS ====================
  function changeQty(id, delta) {
    const it = items.find(i => i.id === id);
    if (!it) return;
    it.quantity = Math.max(0, it.quantity + delta);
    save();
  }

  function editItem(id) {
    const it = items.find(i => i.id === id);
    if (!it) return;
    document.getElementById('add-title').textContent = 'עריכת מוצר';
    document.getElementById('item-id').value = it.id;
    document.getElementById('item-barcode').value = it.barcode || '';
    document.getElementById('item-image').value = it.image || '';
    document.getElementById('item-name').value = it.name;
    document.getElementById('item-company').value = it.company || '';
    document.getElementById('item-qty').value = it.quantity;
    document.getElementById('item-category').value = it.category || 'אחר';
    document.getElementById('item-expiry').value = it.expiry || '';
    document.getElementById('item-location').value = it.location || '';
    document.getElementById('item-threshold').value = it.threshold || 1;
    document.getElementById('item-notes').value = it.notes || '';
    document.getElementById('delete-btn').style.display = 'inline-block';
    document.getElementById('expiry-hint').textContent = '';
    updateImagePreview(it.image);
    document.getElementById('add-modal').classList.add('active');
  }

  function openAddModal(prefill = {}) {
    document.getElementById('add-title').textContent = 'הוספת מוצר';
    document.getElementById('item-id').value = '';
    document.getElementById('item-barcode').value = prefill.barcode || '';
    document.getElementById('item-image').value = prefill.image || '';
    document.getElementById('item-name').value = prefill.name || '';
    document.getElementById('item-company').value = prefill.company || '';
    document.getElementById('item-qty').value = 1;
    document.getElementById('item-category').value = prefill.category || 'מזון יבש';
    document.getElementById('item-expiry').value = prefill.expiry || '';
    document.getElementById('item-location').value = '';
    document.getElementById('item-threshold').value = 1;
    document.getElementById('item-notes').value = '';
    document.getElementById('delete-btn').style.display = 'none';
    updateImagePreview(prefill.image);
    // Show expiry suggestion if no expiry was detected
    if (prefill.expiry) {
      document.getElementById('expiry-hint').textContent = '✓ זוהה מהתמונה';
      document.getElementById('expiry-hint').className = 'expiry-hint auto';
    } else {
      suggestExpiry();
    }
    document.getElementById('add-modal').classList.add('active');
    if (!prefill.name) {
      setTimeout(() => document.getElementById('item-name').focus(), 300);
    }
  }

  function closeAddModal() {
    document.getElementById('add-modal').classList.remove('active');
  }

  function updateImagePreview(imgData) {
    const preview = document.getElementById('image-preview');
    const placeholder = document.getElementById('image-preview-placeholder');
    const removeBtn = document.getElementById('remove-image-btn');
    if (imgData) {
      preview.style.backgroundImage = `url('${imgData}')`;
      preview.classList.add('has-image');
      placeholder.style.display = 'none';
      removeBtn.style.display = 'flex';
    } else {
      preview.style.backgroundImage = '';
      preview.classList.remove('has-image');
      placeholder.style.display = 'block';
      removeBtn.style.display = 'none';
    }
  }

  // ==================== EXPIRY SUGGESTIONS ====================
  // Default shelf-life in months by category
  const CATEGORY_SHELF_MONTHS = {
    'מזון יבש': 12,
    'שימורים': 24,
    'חטיפים': 6,
    'משקאות': 9,
    'תבלינים': 24,
    'ניקיון': 24,
    'טואלטיקה': 24,
    'אחר': 12
  };

  function suggestExpiry() {
    const expiryInput = document.getElementById('item-expiry');
    const hint = document.getElementById('expiry-hint');
    // Only suggest if empty
    if (expiryInput.value) {
      hint.textContent = '';
      return;
    }
    const cat = document.getElementById('item-category').value;
    const months = CATEGORY_SHELF_MONTHS[cat] || 12;
    const d = new Date();
    d.setMonth(d.getMonth() + months);
    const iso = d.toISOString().slice(0, 10);
    hint.innerHTML = `💡 הצעה לפי קטגוריה: ${months} חודשים (<a href="#" onclick="applyExpiry('${iso}'); return false;" style="color: var(--accent); font-weight: 600;">החל</a>)`;
    hint.className = 'expiry-hint';
  }

  function applyExpiry(iso) {
    document.getElementById('item-expiry').value = iso;
    document.getElementById('expiry-hint').textContent = '✓ הוחל';
    document.getElementById('expiry-hint').className = 'expiry-hint auto';
  }

  // Try to extract a date from free text (OCR output or product name)
  function extractExpiryDate(text) {
    if (!text) return null;
    const now = new Date();
    const futureLimit = new Date();
    futureLimit.setFullYear(futureLimit.getFullYear() + 10);

    // Patterns: DD/MM/YYYY, DD.MM.YYYY, DD-MM-YYYY, DD/MM/YY
    const patterns = [
      /(\d{1,2})[\/\.\-](\d{1,2})[\/\.\-](\d{4})/g,
      /(\d{1,2})[\/\.\-](\d{1,2})[\/\.\-](\d{2})(?!\d)/g,
      /(\d{4})[\/\.\-](\d{1,2})[\/\.\-](\d{1,2})/g
    ];

    const candidates = [];
    for (const pat of patterns) {
      let m;
      while ((m = pat.exec(text)) !== null) {
        let d, mo, y;
        if (pat.source.startsWith('(\\d{4})')) {
          y = parseInt(m[1]); mo = parseInt(m[2]); d = parseInt(m[3]);
        } else {
          d = parseInt(m[1]); mo = parseInt(m[2]); y = parseInt(m[3]);
          if (y < 100) y += 2000;
        }
        if (mo >= 1 && mo <= 12 && d >= 1 && d <= 31) {
          const date = new Date(y, mo - 1, d);
          if (!isNaN(date) && date > now && date < futureLimit) {
            candidates.push(date);
          }
        }
      }
    }

    // MM/YYYY only
    const monthOnly = /(?:^|\D)(\d{1,2})[\/\.\-](\d{4})(?:\D|$)/g;
    let m;
    while ((m = monthOnly.exec(text)) !== null) {
      const mo = parseInt(m[1]);
      const y = parseInt(m[2]);
      if (mo >= 1 && mo <= 12) {
        // Set to last day of month
        const date = new Date(y, mo, 0);
        if (!isNaN(date) && date > now && date < futureLimit) {
          candidates.push(date);
        }
      }
    }

    if (candidates.length === 0) return null;
    // Pick the latest date (usually expiry, not production)
    candidates.sort((a, b) => b - a);
    return candidates[0].toISOString().slice(0, 10);
  }
  function captureProductImage() {
    document.getElementById('image-camera-input').click();
  }

  function chooseImage() {
    document.getElementById('image-input').click();
  }

  async function handleImageFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    showLoading('דוחס תמונה...');
    try {
      const compressed = await compressImage(file, 400, 0.7);
      document.getElementById('item-image').value = compressed;
      updateImagePreview(compressed);
      hideLoading();
      showToast('התמונה נוספה', 'success');
    } catch (e) {
      hideLoading();
      showToast('שגיאה בטעינת תמונה', 'error');
    }
    event.target.value = '';
  }

  function removeImage() {
    document.getElementById('item-image').value = '';
    updateImagePreview(null);
  }

  // ==================== OCR ====================
  async function ocrFromImage() {
    const imgData = document.getElementById('item-image').value;
    if (!imgData) {
      showToast('צלמי תמונה של המוצר קודם', 'error');
      return;
    }

    showLoading('מזהה טקסט מהתמונה...', 'זה יכול לקחת 10-30 שניות');
    try {
      const result = await Tesseract.recognize(imgData, 'heb+eng', {
        logger: m => {
          if (m.status === 'recognizing text') {
            document.getElementById('loading-progress').textContent =
              `מזהה: ${Math.round(m.progress * 100)}%`;
          }
        }
      });
      hideLoading();

      const text = result.data.text || '';

      // Try to find an expiry date in the OCR text
      const extractedDate = extractExpiryDate(text);
      if (extractedDate && !document.getElementById('item-expiry').value) {
        document.getElementById('item-expiry').value = extractedDate;
        const d = new Date(extractedDate);
        document.getElementById('expiry-hint').innerHTML =
          `✓ זוהה תאריך תפוגה מהתמונה: ${d.toLocaleDateString('he-IL')}`;
        document.getElementById('expiry-hint').className = 'expiry-hint auto';
      }

      const lines = text
        .split('\n')
        .map(l => l.trim())
        .filter(l => l.length >= 2 && l.length <= 40)
        .filter(l => /[\u0590-\u05FFa-zA-Z]/.test(l));

      if (lines.length === 0) {
        if (extractedDate) {
          showToast('זוהה תאריך תפוגה', 'success');
        } else {
          showToast('לא נמצא טקסט בתמונה', 'error');
        }
        return;
      }

      // Show picker with up to 8 options
      const unique = [...new Set(lines)].slice(0, 8);
      showOcrResults(unique);
    } catch (e) {
      hideLoading();
      console.error(e);
      showToast('שגיאה בזיהוי טקסט', 'error');
    }
  }

  function showOcrResults(lines) {
    const container = document.getElementById('ocr-results');
    container.innerHTML = lines.map(l =>
      `<div class="ocr-result" onclick="selectOcrResult('${escapeHtml(l).replace(/'/g, "\\'")}')">
         ${escapeHtml(l)}
       </div>`
    ).join('');
    document.getElementById('ocr-modal').classList.add('active');
  }

  function selectOcrResult(text) {
    document.getElementById('item-name').value = text;
    closeOcr();
    showToast('השם מולא', 'success');
  }

  function closeOcr() {
    document.getElementById('ocr-modal').classList.remove('active');
  }

  // ==================== SAVE ====================
  function saveItem(e) {
    e.preventDefault();
    const id = document.getElementById('item-id').value;
    const data = {
      name: document.getElementById('item-name').value.trim(),
      company: document.getElementById('item-company').value.trim() || null,
      quantity: parseInt(document.getElementById('item-qty').value) || 0,
      category: document.getElementById('item-category').value,
      expiry: document.getElementById('item-expiry').value || null,
      location: document.getElementById('item-location').value.trim(),
      threshold: parseInt(document.getElementById('item-threshold').value) || 1,
      barcode: document.getElementById('item-barcode').value || null,
      image: document.getElementById('item-image').value || null,
      notes: document.getElementById('item-notes').value.trim() || null
    };

    if (id) {
      const it = items.find(i => i.id === id);
      Object.assign(it, data);
      showToast('המוצר עודכן', 'success');
    } else {
      if (data.barcode) {
        const existing = items.find(i => i.barcode === data.barcode);
        if (existing) {
          existing.quantity += data.quantity;
          if (!existing.image && data.image) existing.image = data.image;
          save();
          closeAddModal();
          showToast(`הוספה כמות ל${existing.name}`, 'success');
          return;
        }
      }
      items.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), ...data });
      showToast('המוצר נוסף', 'success');
    }
    save();
    closeAddModal();
  }

  function deleteItem() {
    const id = document.getElementById('item-id').value;
    if (!id) return;
    if (!confirm('למחוק את המוצר?')) return;
    items = items.filter(i => i.id !== id);
    save();
    closeAddModal();
    showToast('המוצר נמחק', 'success');
  }

  // ==================== BARCODE SCANNER ====================
  async function startScan() {
    const modal = document.getElementById('scanner-modal');
    modal.classList.add('active');

    try {
      codeReader = new ZXing.BrowserMultiFormatReader();
      const devices = await codeReader.listVideoInputDevices();
      const backCam = devices.find(d => /back|rear|environment/i.test(d.label)) || devices[devices.length - 1];

      await codeReader.decodeFromVideoDevice(
        backCam ? backCam.deviceId : null,
        'scanner-video',
        (result, err) => {
          if (result) {
            const code = result.getText();
            stopScan();
            handleBarcode(code);
          }
        }
      );
    } catch (e) {
      console.error(e);
      showToast('לא הצלחתי לפתוח מצלמה', 'error');
      stopScan();
    }
  }

  function stopScan() {
    if (codeReader) {
      codeReader.reset();
      codeReader = null;
    }
    document.getElementById('scanner-modal').classList.remove('active');
  }

  function manualBarcode() {
    const code = prompt('הכניסי מספר ברקוד:');
    if (code) {
      stopScan();
      handleBarcode(code.trim());
    }
  }

  async function handleBarcode(code) {
    const existing = items.find(i => i.barcode === code);
    if (existing) {
      existing.quantity += 1;
      save();
      showToast(`+1 ל${existing.name}`, 'success');
      return;
    }

    showLoading('מחפש מוצר...');
    try {
      const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}.json`);
      const data = await res.json();
      hideLoading();
      if (data.status === 1 && data.product) {
        const p = data.product;
        const name = p.product_name_he || p.product_name || p.generic_name || '';
        const company = p.brands || '';
        const cat = guessCategory(p);
        // Try to fetch product image if available
        let image = null;
        if (p.image_front_small_url || p.image_small_url) {
          try {
            const imgUrl = p.image_front_small_url || p.image_small_url;
            const imgRes = await fetch(imgUrl);
            const blob = await imgRes.blob();
            image = await compressImage(blob, 400, 0.7);
          } catch (err) { /* ignore */ }
        }
        openAddModal({ barcode: code, name, company, category: cat, image });
        return;
      }
    } catch (e) {
      hideLoading();
      console.warn('Lookup failed', e);
    }

    showToast('לא נמצא - צלמי את המוצר', '');
    openAddModal({ barcode: code, name: '' });
  }

  function guessCategory(p) {
    const tags = (p.categories_tags || []).join(' ').toLowerCase();
    if (/beverage|drink|water|juice|soda/.test(tags)) return 'משקאות';
    if (/snack|chip|cracker|chocolate|candy/.test(tags)) return 'חטיפים';
    if (/canned|preserve/.test(tags)) return 'שימורים';
    if (/spice|seasoning|herb/.test(tags)) return 'תבלינים';
    if (/cleaning|detergent/.test(tags)) return 'ניקיון';
    return 'מזון יבש';
  }

  function showShoppingList() {
    closeMenu();
    const low = items.filter(i => i.quantity <= (i.threshold || 1));
    if (low.length === 0) {
      showToast('המזווה מלא - אין מה לקנות 🎉', 'success');
      return;
    }
    // Group by category
    const grouped = {};
    low.forEach(i => {
      const cat = i.category || 'אחר';
      if (!grouped[cat]) grouped[cat] = [];
      grouped[cat].push(i);
    });

    let html = `<div style="font-size:13px; color:rgba(0,0,0,0.6); margin-bottom:12px;">${low.length} מוצרים ברשימה</div>`;
    for (const cat of Object.keys(grouped).sort()) {
      html += `<div style="margin-bottom:14px;">
        <div style="font-weight:700; font-size:14px; color:var(--accent); margin-bottom:6px;">${getCategoryEmoji(cat)} ${escapeHtml(cat)}</div>`;
      grouped[cat].forEach(i => {
        html += `<div style="padding:8px 12px; background:var(--card); border-radius:8px; margin-bottom:4px; display:flex; justify-content:space-between; align-items:center;">
          <span>${escapeHtml(i.name)}</span>
          <span style="font-size:12px; color:rgba(0,0,0,0.5);">יש: ${i.quantity} / סף: ${i.threshold || 1}</span>
        </div>`;
      });

    }

    document.getElementById('shopping-list-body').innerHTML = html;
    document.getElementById('shopping-modal').classList.add('active');
  }

  function shareShoppingList() {
    const low = items.filter(i => i.quantity <= (i.threshold || 1));
    if (low.length === 0) return;

    // Group by category
    const grouped = {};
    low.forEach(i => {
      const cat = i.category || 'אחר';
      if (!grouped[cat]) grouped[cat] = [];
      grouped[cat].push(i);
    });

    let text = '🛒 רשימת קניות\n\n';
    for (const cat of Object.keys(grouped).sort()) {
      text += `${getCategoryEmoji(cat)} ${cat}:\n`;
      grouped[cat].forEach(i => {
        text += `  • ${i.name}\n`;
      });
      text += '\n';
    }
    text += `סה"כ: ${low.length} פריטים`;

    if (navigator.share) {
      navigator.share({ title: 'רשימת קניות', text }).catch(() => {});
    } else {
      navigator.clipboard.writeText(text).then(() => {
        showToast('הרשימה הועתקה ללוח', 'success');
      });
    }
  }

  function normalizeText(s) {
    return (s || '').toLowerCase().replace(/[\u0591-\u05C7]/g, '').trim();
  }

  function itemMatchesIngredient(items, ingredient) {
    const ing = normalizeText(ingredient);
    return items.find(it => {
      if (it.quantity <= 0) return false;
      const name = normalizeText(it.name);
      return name.includes(ing) || ing.includes(name);
    });
  }

  function findRecipes() {
    const available = items.filter(i => i.quantity > 0);

    return RECIPES.map(recipe => {
      const haveRequired = recipe.ingredients.filter(ing =>
        itemMatchesIngredient(available, ing)
      );
      const missingRequired = recipe.ingredients.filter(ing =>
        !itemMatchesIngredient(available, ing)
      );
      const haveOptional = (recipe.optional || []).filter(ing =>
        itemMatchesIngredient(available, ing)
      );
      const matchPercent = Math.round((haveRequired.length / recipe.ingredients.length) * 100);
      return {
        ...recipe,
        haveRequired,
        missingRequired,
        haveOptional,
        matchPercent,
        canCook: missingRequired.length === 0
      };
    }).sort((a, b) => b.matchPercent - a.matchPercent);
  }

  function showRecipes() {
    closeMenu();
    const recipes = findRecipes();
    const canCook = recipes.filter(r => r.canCook);
    const almostCan = recipes.filter(r => !r.canCook && r.missingRequired.length <= 2 && r.haveRequired.length >= 2);

    let html = '';

    if (items.length === 0) {
      html = '<div class="empty"><div class="empty-emoji">🍳</div><div class="empty-text">המזווה ריק. הוסיפי מוצרים כדי לקבל הצעות למתכונים</div></div>';
    } else {
      if (canCook.length > 0) {
        html += `<div style="font-weight:700; font-size:16px; color:var(--olive); margin-bottom:10px;">✓ אפשר להכין עכשיו (${canCook.length})</div>`;
        canCook.forEach(r => html += recipeCard(r));
      }
      if (almostCan.length > 0) {
        html += `<div style="font-weight:700; font-size:16px; color:var(--mustard); margin-top:18px; margin-bottom:10px;">⌛ כמעט שם (חסר 1-2 מצרכים)</div>`;
        almostCan.forEach(r => html += recipeCard(r));
      }
      if (canCook.length === 0 && almostCan.length === 0) {
        html = '<div class="empty"><div class="empty-emoji">🤔</div><div class="empty-text">לא נמצאו מתכונים מתאימים.<br>נסי להוסיף מצרכים בסיסיים כמו אורז, פסטה, ביצים, ירקות</div></div>';
      }
    }

    document.getElementById('recipes-body').innerHTML = html;
    document.getElementById('recipes-modal').classList.add('active');
  }

  function recipeCard(r) {
    const haveList = r.haveRequired.map(i => `<span style="color:var(--olive);">✓ ${escapeHtml(i)}</span>`).join(', ');
    const missList = r.missingRequired.map(i => `<span style="color:var(--accent);">✗ ${escapeHtml(i)}</span>`).join(', ');
    const optList = r.haveOptional.length > 0 ? `<div style="font-size:11px; color:rgba(0,0,0,0.5); margin-top:4px;">בונוס: ${r.haveOptional.map(escapeHtml).join(', ')}</div>` : '';

    return `
      <div style="background:var(--card); border-radius:14px; padding:14px; margin-bottom:10px; box-shadow:0 2px 8px var(--shadow);">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
          <div style="font-weight:700; font-size:16px;">${r.emoji} ${escapeHtml(r.name)}</div>
          <div style="font-size:12px; color:rgba(0,0,0,0.5);">⏱ ${escapeHtml(r.time)}</div>
        </div>
        <div style="font-size:12px; margin-bottom:6px;">
          ${haveList}${missList ? ' · ' + missList : ''}
        </div>
        ${optList}
        <details style="margin-top:8px;">
          <summary style="cursor:pointer; font-size:13px; font-weight:600; color:var(--accent);">📖 הוראות הכנה</summary>
          <div style="margin-top:8px; font-size:13px; line-height:1.6; color:rgba(0,0,0,0.75);">${escapeHtml(r.steps)}</div>
        </details>
      </div>`;
  }

  function exportCSV() {
    const rows = [['שם', 'חברה', 'כמות', 'קטגוריה', 'תפוגה', 'מיקום', 'סף התראה', 'הערות', 'ברקוד']];
    items.forEach(i => {
      rows.push([i.name, i.company || '', i.quantity, i.category || '', i.expiry || '', i.location || '', i.threshold || 1, i.notes || '', i.barcode || '']);
    });
    const csv = '\uFEFF' + rows.map(r =>
      r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')
    ).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pantry-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    closeMenu();
    showToast('הקובץ יוצא בהצלחה', 'success');
  }

  function exportBackup() {
    const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pantry-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    closeMenu();
    showToast('גיבוי נוצר', 'success');
  }

  function importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (Array.isArray(data)) {
            if (confirm(`לייבא ${data.length} פריטים? זה יחליף את הרשימה הנוכחית.`)) {
              items = data;
              save();
              showToast('יובא בהצלחה', 'success');
            }
          }
        } catch (e) {
          showToast('קובץ לא תקין', 'error');
        }
      };
      reader.readAsText(file);
    };
    input.click();
    closeMenu();
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');

    t.className = 'toast show ' + type;
    setTimeout(() => t.classList.remove('show'), 2500);

      if (e.target === bd) {
        if (bd.id === 'scanner-modal') stopScan();
        else bd.classList.remove('active');
      }
    });
  });
